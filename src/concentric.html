<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;justify-content:space-between;align-items:center;min-height:100vh;font-family:'Newsreader',serif;flex-direction:column;padding:8px 12px 47px}
h1{color:#222;font-weight:300;font-size:1rem;letter-spacing:2px;margin-bottom:10px}
h3{color:#666;font-weight:300;font-size:0.65rem;letter-spacing:1px;text-align:center;line-height:1.4;margin-bottom:10px}
.controls{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.controls button{padding:5px 16px;background:none;border:1px solid #ccc;color:#666;font-size:0.75rem;border-radius:3px;cursor:pointer;letter-spacing:1px}
.controls button:hover{background:#f5f5f5}
.controls button.active{background:#222;color:#fff;border-color:#222}
.toggles{display:flex;gap:10px;justify-content:center;margin-bottom:10px}
.toggles button{padding:2px 10px;border:1px solid #ccc;border-radius:3px;font-size:0.6rem;cursor:pointer;letter-spacing:1px;background:none;color:#666}
.toggles button:hover{background:#f5f5f5}
.toggles button.on-dem{background:rgba(255,200,0,0.2);border-color:rgba(255,200,0,0.6);color:#8a7000}
.toggles button.on-aut{background:rgba(255,105,180,0.2);border-color:rgba(255,105,180,0.6);color:#b01a6a}
.toggles button.off{opacity:.5}
#chart{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
canvas{display:block}
.note{color:#999;font-size:0.7rem;margin-top:8px}
.export-btn{margin-top:8px;padding:5px 16px;background:none;border:1px solid #ccc;color:#666;font-size:0.75rem;border-radius:3px;cursor:pointer;letter-spacing:1px}
.export-btn:hover{background:#f5f5f5}
.scale-row{display:flex;align-items:center;gap:10px}
.scale-row label{color:#999;font-size:0.7rem;letter-spacing:1px}
.scale-row input[type=range]{width:120px;accent-color:#666}
.tooltip{position:absolute;pointer-events:none;background:rgba(0,0,0,0.85);color:#fff;padding:5px 10px;border-radius:3px;font-size:0.7rem;display:none;white-space:nowrap;z-index:10}
</style>
</head>

const fy=String(ctry.data[0][0]);svg+=`<rect x="${cx-tw(fy)/2-2}" y="${cy-yrH/2}" width="${tw(fy)+4}" height="${yrH}" fill="#fff" fill-opacity="0.7"/><text x="${cx}" y="${cy}" fill="#000" font-size="11" text-anchor="middle" dy=".35em">${fy}</text>`
svg+=`<text x="${cx}" y="${cy+outerR+12}" fill="#222" font-size="14" font-weight="bold" text-anchor="middle">${ctry.label}</text>`
const kx=cx-120,ky=cy+outerR+54;
svg+=`<line x1="${kx+22}" y1="${ky}" x2="${kx+46}" y2="${ky}" stroke="#231f20" stroke-width="1"/><text x="${kx+52}" y="${ky}" fill="#999" font-size="8" text-anchor="start" dy=".35em">Democracy</text>`
svg+=`<line x1="${kx+22}" y1="${ky+14}" x2="${kx+46}" y2="${ky+14}" stroke="#231f20" stroke-width="5"/><text x="${kx+52}" y="${ky+14}" fill="#999" font-size="8" text-anchor="start" dy=".35em">Autocracy</text>`
let wd=`M${kx+22},${ky+28}`;for(let j=0;j<5;j++){const x=kx+22+j*6,y=ky+28+Math.sin(j*1.2)*3;wd+=` L${x},${y}`}
svg+=`<path d="${wd}" fill="none" stroke="#231f20" stroke-width="2"/><text x="${kx+52}" y="${ky+28}" fill="#999" font-size="8" text-anchor="start" dy=".35em">Periods of Transition</text></svg>`
    const blob=new Blob([svg],{type:'image/svg+xml'}),url=URL.createObjectURL(blob),l=document.createElement('a');l.download=`v2x_${ctry.id}_${YR0}-${YR1}.svg`;l.href=url;l.click();URL.revokeObjectURL(url)};
document.getElementById('batchSvgBtn').onclick=()=>{
  const origDem=showDem,origAut=showAut;showDem=false;showAut=false;
  let i=0;
  function next(){
    if(i>=countries.length){showDem=origDem;showAut=origAut;batchSvgBtn.textContent='BATCH EXPORT ALL SVGS';return}
    const ctry=countries[i];batchSvgBtn.textContent=`${i+1}/${countries.length} ${ctry.label}`;
    const rads=makeRads(),outerR=rads[rads.length-1],svgPad=100,sz=outerR*2+svgPad*2,cx2=sz/2,cy2=sz/2;
    const valMap=new Map(ctry.data.map(d=>[d[0],d[1]]));
    const yrIdx2=y=>y-YR0;
    const rng2=mulberry32(SEED);
    function tw2(t){return String(t).length*6.6}
    let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}"><rect width="${sz}" height="${sz}" fill="#fff"/>`;
    for(let i2=0;i2<N_YEARS;i2++){const year=yearList[i2],val=valMap.get(year);if(val==null)continue;const r=rads[i2],sw2=strokeWidth(val),edi=val/V_MAX;if(ctry.demEp.has(year)||ctry.autEp.has(year)){const isDem=ctry.demEp.has(year);const arcPerSeg=isDem?4+(1-edi)*36:20,amp2=isDem?edi*6:3;const nSeg=Math.max(4,Math.min(Math.round((2*Math.PI*r)/arcPerSeg),200));const pts=[];for(let j=0;j<nSeg;j++){const theta=(j/nSeg)*2*Math.PI;const radial=(rng2()-0.5)*2*Math.min(amp2,gapPx*0.45);pts.push({x:cx2+(r+radial)*Math.cos(theta),y:cy2+(r+radial)*Math.sin(theta)})}let d=`M${pts[0].x},${pts[0].y}`;for(let j=0;j<nSeg;j++){const a=pts[(j-1+nSeg)%nSeg],b=pts[j],c2=pts[(j+1)%nSeg],e=pts[(j+2)%nSeg];d+=`C${b.x+(c2.x-a.x)/6},${b.y+(c2.y-a.y)/6} ${c2.x+(b.x-e.x)/6},${c2.y+(b.y-e.y)/6} ${c2.x},${c2.y}`}svg+=`<path d="${d}" fill="none" stroke="#231f20" stroke-width="${sw2}" stroke-linecap="round" stroke-linejoin="round"/>`}else{svg+=`<circle cx="${cx2}" cy="${cy2}" r="${r}" fill="none" stroke="#231f20" stroke-width="${sw2}"/>`}}
    const yrH=13;for(let d=Math.ceil(YR0/20)*20+20;d<=YR1;d+=20){if(valMap.get(d)==null)continue;const x=cx2+rads[yrIdx2(d)]+5;svg+=`<rect x="${x-2}" y="${cy2-yrH/2}" width="${tw2(d)+4}" height="${yrH}" fill="#fff" fill-opacity="0.7"/><text x="${x}" y="${cy2}" fill="#000" font-size="11" dy=".35em">${d}</text>`}
    const fy=String(ctry.data[0][0]);svg+=`<rect x="${cx2-tw2(fy)/2-2}" y="${cy2-yrH/2}" width="${tw2(fy)+4}" height="${yrH}" fill="#fff" fill-opacity="0.7"/><text x="${cx2}" y="${cy2}" fill="#000" font-size="11" text-anchor="middle" dy=".35em">${fy}</text>`
    svg+=`<text x="${cx2}" y="${cy2+outerR+12}" fill="#222" font-size="14" font-weight="bold" text-anchor="middle">${ctry.label}</text>`
    const blob=new Blob([svg+'</svg>'],{type:'image/svg+xml'}),url=URL.createObjectURL(blob),l=document.createElement('a');l.download=`v2x_${ctry.id}_${YR0}-${YR1}.svg`;l.href=url;l.click();URL.revokeObjectURL(url);
    i++;setTimeout(next,400)
  }
  next()
};
