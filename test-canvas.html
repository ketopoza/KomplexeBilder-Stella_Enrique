<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <style>
    body { background: #eee; font-family: 'Newsreader', serif; margin: 20px; }
    .canvas-wrap { display: inline-block; margin: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .canvas-wrap canvas { display: block; }
    .canvas-wrap .label { padding: 4px 8px; background: #333; color: #fff; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Expanded Canvas Preview</h1>
  <div id="container"></div>

  <script>
    const textEntries = [
      { year: '1908_ Young Turk Revolution. ', text: "The Commitee of Union and Progress, forces Sultan Abdul Hamid II \nto restore constitution, ending 30 years autocratic sultanate.\n \nMarks the beginning of the Second Constitutional Era \nand the start of the Ottoman Empire's decline.", y: 0.22, img: 't1908', caption: 'Armenian, Greek Orthodox & Muslim religious leaders, declaring the Revolution. \nWikipedia - Public domain' },
      { year: '1946_ Multi-party transition. ', text: 'After 23 years of single-party CHP rule, the Democratic Party (DP) is founded as opposition.\n1950 brings fair elections with DP victory.', y: 1.22 },
      { year: "1954_ Democratic Party's authoritarian turn.  ", text: "Prime Minister Adnan Menderes restricts opposition gets suppressed and implements restrictive Press Law.\nSilenced critics, intimidated journalists, and purged opponents from state institutions.\nFollowed by a political polarization with the left-wing clashing and economic instability.", y: 1.4 },
      { year: '1962_ 1961 constitution. ', text: 'After 1960 military coup, a new constitution is adopted, bringing bill of rights, \nconstitutional court, a strong parliament and separation of powers.', y: 1.63 },
      { year: '1980_ 12.09 Military coup. ', text: 'Kenan Evren seizes power amid political violence, economic crisis \nand governmental paralysis. \n\nParliament is dissolved and all parties banned, 250.000 arrested, \nwidespread torture and all political activity suspended.', y: 2.09, img: 't1980', caption: 'Turkish troops blocking a main road in Ankara\nKeystone/​Hulton Archive/​Getty Images' },
      { year: "1982_ New military constitution.", text: "Civilian rule restored but constitution limits political freedoms, strengthens executive, \ngrants military sweeping authority. \n1983 elections bring Turgut Özal's ANAP to power. \n1987 referendum allows former politicians back. \nEconomic liberalization and controlled political opening begin.", y: 2.18 },
      { year: '1998_ EU harmonization reforms accelerate. ', text: 'EU harmonization reforms accelerate, forcing out the Islamic-led coalition.\nConstitutional Court bans Welfare Party (RP) for violating secularism; a reform wave follows \nwith military-secular elite asserting control.\nGains EU candidate status, constitutional amendments, abolish death penalty, \nexpands freedom of expression.', y: 2.6 },
      { year: '2005_ AKP/Erdoğan authoriatian cup. ', text: "Following AKP's 2002 electoral victory, EU accession talks begin, \nrepresenting democratization peak.\nHowever Erdoğan simultaneously begins authoritarian drift:\n2007 presidential crisis. \n2010 referendum shifts power to the executive. \n2013 Gezi protests and subsequent crackdown. \n2013-2014 corruption probes suppressed. \npost-2016 cup attemts mass purges (130.000 dismissed, arrests of journalists, acedemics, politicians)", y: 2.77, img: 't2013', caption: '14. Nov. 2013 - Front side of Atatürk Cultural Center covered with banners. \nGezginrocker - Copyrighted free use', photoScale: 1.28 },
    ]

    function measureText(text, fontSize) {
      const c = document.createElement('canvas').getContext('2d')
      c.font = `${fontSize}px Newsreader`
      const m = c.measureText(text)
      return { width: m.width, height: fontSize * 1.2 }
    }

    function drawExpandedCanvas(entry, img) {
      const margin = 24
      const gap = 20
      const photoMaxW = 520

      const labelParts = entry.year.split('\n')
      const title = labelParts[0]
      const subtitle = labelParts.length > 1 ? labelParts.slice(1).join(' ').trim() : ''
      const { width: titleWidth, height: titleHeight } = measureText(title, 80)
      const subMetrics = subtitle ? measureText(subtitle, 50) : { width: 0, height: 0 }
      const lines = entry.text.split('\n')
      const lineData = lines.map(line => measureText(line, 50))
      const bodyWidth = lineData.length ? Math.max(...lineData.map(l => l.width)) : 0
      const bodyHeight = lineData.reduce((sum, line) => sum + line.height, 0) + Math.max(0, lineData.length - 1) * 4

      let expCanvasW, expCanvasH
      let photoDrawW = 0, photoDrawH = 0, capH = 0, capW = 0

      if (img) {
        photoDrawW = Math.min(img.naturalWidth, photoMaxW) * (entry.photoScale || 1)
        photoDrawH = (img.naturalHeight / img.naturalWidth) * photoDrawW
        const capText = entry.caption || ''
        if (capText) {
          const capLines = capText.split('\n')
          let maxCapW = 0
          for (const line of capLines) {
            const m = measureText(line, 30)
            if (m.width > maxCapW) maxCapW = m.width
          }
          capH = capLines.length * (30 * 1.2) + Math.max(0, capLines.length - 1) * 4
          capW = maxCapW
        }
        const sectionY = margin + titleHeight + 10
        const textLines = entry.text.split('\n').length
        const textH = textLines * (50 * 1.2) + Math.max(0, textLines - 1) * 4
        const sectionH = Math.max(photoDrawH, textH)
        expCanvasH = Math.ceil(sectionY + sectionH + 10 + capH + margin)
        const rightColW = Math.max(titleWidth, bodyWidth)
        expCanvasW = Math.max(titleWidth, margin + photoDrawW + gap + rightColW + margin)
      } else {
        expCanvasH = Math.ceil(titleHeight + 10 + (subMetrics.height > 0 ? subMetrics.height + 10 : 0) + bodyHeight + 48)
        expCanvasW = Math.max(titleWidth, subMetrics.width, bodyWidth) + 48
      }

      const canvas = document.createElement('canvas')
      canvas.width = expCanvasW
      canvas.height = expCanvasH
      const ctx = canvas.getContext('2d')
      ctx.fillStyle = '#ffffff'
      ctx.fillRect(0, 0, canvas.width, canvas.height)
      ctx.fillStyle = '#000'
      ctx.textBaseline = 'top'

      if (img) {
        const sectionY = margin + titleHeight + 10
        ctx.font = '80px Newsreader'
        ctx.fillText(title, margin, margin)
        ctx.drawImage(img, margin, sectionY, photoDrawW, photoDrawH)
        const textX = margin + photoDrawW + gap
        ctx.font = '50px Newsreader'
        entry.text.split('\n').forEach((line, li) => {
          ctx.fillText(line, textX, sectionY + li * (50 * 1.2 + 4))
        })
        const capY = sectionY + photoDrawH + 10
        if (entry.caption) {
          ctx.font = '30px Newsreader'
          ctx.fillStyle = '#888888'
          entry.caption.split('\n').forEach((line, li) => {
            ctx.fillText(line, margin, capY + li * (30 * 1.2 + 4))
          })
          ctx.fillStyle = '#000'
        }
      } else {
        ctx.font = ' 80px Newsreader'
        ctx.fillText(title, 24, 24)
        let y = 24 + titleHeight + 10
        if (subtitle) {
          ctx.font = '50px Newsreader'
          ctx.fillText(subtitle, 24, y)
          y += subMetrics.height + 10
        }
        entry.text.split('\n').forEach(line => {
          ctx.font = '50px Newsreader'
          ctx.fillText(line, 24, y)
          y += 50 * 1.2 + 4
        })
      }
      return canvas
    }

    const container = document.getElementById('container')

    Promise.all([
      document.fonts.load('400 80px Newsreader'),
      document.fonts.load('400 50px Newsreader'),
      document.fonts.load('400 30px Newsreader'),
    ]).then(async () => {
      const loadImage = src => new Promise(resolve => {
        const img = new Image()
        img.onload = () => resolve(img)
        img.onerror = () => resolve(null)
        img.src = src
      })

      for (const entry of textEntries) {
        const imgKey = entry.img || entry.year.split(/[_\s]/)[0]
        const img = await loadImage('./src/assets/' + imgKey + '.png')

        const wrap = document.createElement('div')
        wrap.className = 'canvas-wrap'
        const label = document.createElement('div')
        label.className = 'label'
        label.textContent = entry.year + (img ? ' (with image)' : ' (no image)')
        wrap.appendChild(label)

        const canvas = drawExpandedCanvas(entry, img)
        wrap.appendChild(canvas)
        container.appendChild(wrap)
      }
    })
  </script>
</body>
</html>
